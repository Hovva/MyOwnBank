<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My own bank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <main id="content" class="content">
            <div class="loader">Загружаем банк...</div>
        </main>

        <nav class="bottom-nav" aria-label="Навигация">
            <button id="nav-banks" class="nav-side" type="button" aria-label="Профиль">
                <span id="nav-banks-icon"></span>
            </button>
            <div class="nav-separator" id="nav-separator-1" aria-hidden="true"></div>
            <button id="nav-home" class="nav-home" type="button" aria-label="Банк">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M12 3.6 4.2 12v9h5.1v-5.8h5.4V21H19.8v-9L12 3.6Z"/>
                    <path fill="currentColor" d="M16.1 10.1h2.4v4.1h-2.4V10.1Z"/>
                    <rect class="house-cutout" x="10.2" y="12.1" width="3.6" height="3.6" rx=".35"/>
                    <rect class="house-cutout" x="11.1" y="16.8" width="1.8" height="4.2" rx=".25"/>
                </svg>
            </button>
            <div class="nav-separator" id="nav-separator-2" aria-hidden="true"></div>
            <button id="nav-shop" class="nav-side" type="button" aria-label="Магазин">
                <span id="nav-shop-icon"></span>
            </button>
            <div class="nav-separator" id="nav-separator-3" aria-hidden="true"></div>
            <button id="nav-cart" class="nav-side nav-cart" type="button" aria-label="Корзина">
                <span id="nav-cart-icon"></span>
                <span class="nav-cart__badge hidden" id="nav-cart-badge">0</span>
            </button>
        </nav>
    </div>

    <input id="file-my-card" class="hidden-input" type="file" accept="image/png,image/jpeg,image/webp">
    <input id="file-template" class="hidden-input" type="file" accept="image/png,image/jpeg,image/webp">

    <script src="assets/icons/icons.js"></script>
    <script src="app.js"></script>
</body>
</html>
