<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My own bank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <main id="content" class="content">
            <div class="loader">Загружаем банк...</div>
        </main>

        <nav class="bottom-nav" aria-label="Навигация">
            <button id="nav-banks" class="nav-side" type="button" aria-label="Банки">
                <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z"/></svg>
            </button>
            <button id="nav-home" class="nav-home" type="button" aria-label="Домой">
                <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-9.5-8.5C1.2 9.2 3.4 5 7.5 5c2.1 0 3.4 1.2 4.5 2.7C13.1 6.2 14.4 5 16.5 5 20.6 5 22.8 9.2 21.5 12.5 19 16.65 12 21 12 21z"/></svg>
            </button>
            <button id="nav-action" class="nav-side" type="button" aria-label="Магазин">
                <svg viewBox="0 0 24 24"><path d="M7 4h10l1 3h3v2h-1l-2 11H6L4 9H3V7h3l1-3zm3 3h4l-.5-1.5h-3L10 7zm-1.2 4 1 6h2.4l1-6H8.8zm4.9 0-1 6h2.4l1-6h-2.4z"/></svg>
            </button>
        </nav>
    </div>

    <input id="file-my-card" class="hidden-input" type="file" accept="image/png,image/jpeg,image/webp">
    <input id="file-template" class="hidden-input" type="file" accept="image/png,image/jpeg,image/webp">

    <script src="app.js"></script>
</body>
</html>
